<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecodeMDVoice - Background Music</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .audio-player {
            background: #f5f5f5;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        audio {
            width: 100%;
            height: 40px;
            border-radius: 8px;
        }
        
        .info {
            text-align: center;
            color: #666;
            font-size: 13px;
            line-height: 1.6;
            margin-top: 15px;
        }
        
        .status {
            text-align: center;
            padding: 15px;
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            border-radius: 5px;
            color: #2e7d32;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 DecodeMDVoice</h1>
        <p class="subtitle">Background Music Player</p>
        
        <div class="audio-player">
            <audio controls autoplay loop>
                <source src="background-music.mp3" type="audio/mpeg">
                <source src="background-music.wav" type="audio/wav">
                <source src="background-music.ogg" type="audio/ogg">
                Your browser does not support the audio element.
            </audio>
            
            <div class="info">
                <p>🎧 Background music is now active</p>
                <p style="margin-top: 10px; font-size: 12px;">Loop: ON | Volume: Adjustable</p>
            </div>
        </div>
        
        <div class="status">
            ✓ Audio player is ready!
        </div>
    </div>
</body>
</html>
